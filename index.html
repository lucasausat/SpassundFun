<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TROLL HORROR 💀</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
overflow:hidden;
user-select:none;
}

/* epilepsy warning */

#warning{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
color:#ff4444;
padding:10px;
text-align:center;
font-size:14px;
z-index:999999;
}

/* jumpscare */

#jumpscare{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:20rem;
z-index:9999;
}

/* slide horror message */

#horrorMsg{
position:fixed;
bottom:-100px;
left:50%;
transform:translateX(-50%);
background:#1a0000;
border:2px solid red;
padding:15px 30px;
font-size:1.2rem;
transition:bottom 0.6s;
z-index:5000;
}

/* button */

#runBtn{
padding:15px 35px;
font-size:20px;
background:#ff3333;
border:none;
border-radius:50px;
cursor:pointer;
position:absolute;
box-shadow:0 0 20px red;
}

#score{
font-size:2rem;
}

/* horror overlay */

#darkOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle,transparent 20%,black 80%);
z-index:10;
}

</style>
</head>

<body>

<div id="warning">
⚠ WARNUNG: Diese Seite enthält schnelle visuelle Effekte und Jumpscares. Nicht geeignet für Personen mit Epilepsie oder Lichtempfindlichkeit.
</div>

<div id="jumpscare">💀</div>

<div id="horrorMsg"></div>

<div id="darkOverlay"></div>

<h1>Fang den Button</h1>

<div id="score">Score: <span id="count">0</span></div>

<button id="runBtn">KLICK MICH</button>

<script>

const btn = document.getElementById("runBtn")
const jumpscare = document.getElementById("jumpscare")
const msg = document.getElementById("horrorMsg")
const scoreSpan = document.getElementById("count")

let score = 0
let phase = 0

/* device id */

if(!localStorage.getItem("dev_id")){
localStorage.setItem("dev_id","DEV-"+Math.random().toString(36).substring(2,10))
}

/* slide message */

function horrorMessage(text){

msg.innerText = text
msg.style.bottom="40px"

setTimeout(()=>{
msg.style.bottom="-100px"
},4000)

}

/* jumpscare */

function scare(emoji="💀"){

jumpscare.innerText = emoji
jumpscare.style.display="flex"

setTimeout(()=>{
jumpscare.style.display="none"
},200)

}

/* move button */

function moveButton(){

let x = Math.random()*(window.innerWidth-btn.offsetWidth)
let y = Math.random()*(window.innerHeight-btn.offsetHeight)

btn.style.left=x+"px"
btn.style.top=y+"px"

}

/* mouse escape */

document.addEventListener("mousemove",e=>{

const rect = btn.getBoundingClientRect()

let dx = e.clientX-rect.left
let dy = e.clientY-rect.top

let dist = Math.sqrt(dx*dx+dy*dy)

if(dist<120){
moveButton()
}

})

/* fake buttons */

function spawnFakes(){

for(let i=0;i<4;i++){

let fake = btn.cloneNode(true)

fake.innerText="FALSCH"

fake.onclick=()=>{
scare("👻")
}

document.body.appendChild(fake)

fake.style.left=Math.random()*window.innerWidth+"px"
fake.style.top=Math.random()*window.innerHeight+"px"

}

}

/* phases */

function nextPhase(){

phase=Math.floor(Math.random()*4)

if(phase===0){
horrorMessage("Es beobachtet dich...")
}

if(phase===1){
spawnFakes()
horrorMessage("Nicht jeder Button ist echt.")
}

if(phase===2){

document.body.style.transform="rotate(2deg)"
horrorMessage("Die Realität verzerrt sich.")

}

if(phase===3){

horrorMessage("Du solltest vielleicht aufhören.")

}

}

setInterval(nextPhase,25000)

/* click */

btn.onclick=()=>{

score++
scoreSpan.innerText=score

scare("😱")

moveButton()

if(score===5){
horrorMessage("Du wirst besser...")
}

if(score===10){
horrorMessage("Das Spiel wird jetzt schwieriger.")
}

if(score===15){
fakeVirus()
}

}

/* virus screen */

function fakeVirus(){

document.body.innerHTML=`

<h1 style="color:red;font-size:4rem">⚠ SYSTEM INFECTED</h1>

<p>Uploading personal files...</p>

<progress id="bar" max="100" value="0"></progress>

`

let bar=document.getElementById("bar")

let i=0

let interval=setInterval(()=>{

i+=Math.random()*10
bar.value=i

if(i>=100){
clearInterval(interval)
location.reload()
}

},200)

}

/* devtools detection */

setInterval(()=>{

const threshold=160

if(window.outerWidth-window.innerWidth>threshold ||
window.outerHeight-window.innerHeight>threshold){

horrorMessage("Manipulation erkannt.")

}

},1000)

/* random scares */

setInterval(()=>{

if(Math.random()>0.7){
scare("👁")
}

},20000)

/* init */

moveButton()

</script>

</body>
</html>
