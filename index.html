<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Glück beim Klicken! 😂</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            transition: background-color 0.1s ease;
            user-select: none;
        }

        h1 { color: #ff4757; text-shadow: 2px 2px #ffcc00; }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px dashed #2ed573;
            position: relative;
        }

        #runAwayBtn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            transition: left 0.1s ease, top 0.1s ease, transform 0.1s ease;
            box-shadow: 0 5px #c0392b;
            z-index: 1000;
        }

        /* Verhindert Ghost-Klicks auf Mobile */
        #runAwayBtn { touch-action: none; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="container">
        <h1 id="mainTitle">Viel Spaß beim Suchen! 🎈</h1>
        <p>Autoclicker zwecklos. Konsole gesperrt. 😎</p>
        <div id="counterDisplay">Versuche: <span id="count">0</span></div>
    </div>

    <button id="runAwayBtn">KLICK MICH!</button>

    <script>
        const btn = document.getElementById('runAwayBtn');
        const countSpan = document.getElementById('count');
        const title = document.getElementById('mainTitle');
        let clicks = 0;
        let lastClickTime = 0;

        // 1. Dev-Console Sperre (Tastenkombinationen)
        document.addEventListener('keydown', (e) => {
            if (e.key === "F12" || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                alert("Nix da! Keine Konsole für dich! 🚫");
            }
        });

        // 2. Tab-Trolling
        window.onblur = () => { document.title = "KOMM ZURÜCK! 😭"; };
        window.onfocus = () => { document.title = "Viel Glück beim Klicken! 😂"; };

        // 3. Die Flucht-Logik
        function moveButton() {
            const maxX = window.innerWidth - btn.clientWidth;
            const maxY = window.innerHeight - btn.clientHeight;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            // Farben-Chaos
            document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 85%)`;
            
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
        }

        btn.addEventListener('mouseover', moveButton);
        btn.addEventListener('pointermove', moveButton); // Erkennt Maus-Annäherung besser

        // 4. Anti-Autoclicker & Klick-Logik
        btn.addEventListener('click', (e) => {
            const currentTime = new Date().getTime();
            const timeDiff = currentTime - lastClickTime;

            if (timeDiff < 50 && lastClickTime !== 0) {
                alert("AUTOCLICKER ERKANNT! 🤖 Du Schummler!");
                clicks = 0;
            } else {
                clicks++;
                if(clicks % 3 === 0) {
                   alert("Fehler 404: Klick nicht gefunden. Bitte Hardware neustarten. 😉");
                } else {
                   alert("WAS?! Wie hast du das gemacht? 😱");
                }
            }
            
            lastClickTime = currentTime;
            countSpan.innerText = clicks;
            moveButton();
        });

        // Startposition setzen
        moveButton();
    </script>
</body>
</html>
