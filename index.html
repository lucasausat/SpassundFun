
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OFFLINE | ULTIMATE CHAOS GAMES</title>
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        /* Glitch Effekt für den Titel */
        .glitch {
            font-size: 3rem;
            font-weight: bold;
            color: #ff3333;
            text-shadow: 2px 2px #000;
            position: relative;
            animation: glitch-anim 2s infinite linear alternate-reverse;
            margin-bottom: 20px;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 red, -2px 0 blue; }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border: 2px solid #ff3333;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.2);
            position: relative;
        }

        .status-box {
            background: #111;
            border-left: 5px solid #ff3333;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
        }

        .loading-bar {
            width: 100%;
            height: 10px;
            background: #222;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .loading-fill {
            width: 20%;
            height: 100%;
            background: #ff3333;
            box-shadow: 0 0 10px #ff3333;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        p {
            color: #888;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .date {
            font-weight: bold;
            color: white;
            border: 1px solid #444;
            padding: 5px 10px;
            display: inline-block;
            margin-top: 20px;
        }

        /* Hintergrund-Rauschen */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="glitch">SYSTEM CRASHED 💀</div>
        <h1>WARTUNGSMODUS</h1>
        
        <p>
            Das Chaos wurde zu groß. Wir kalibrieren die Server neu und fügen neue Jumpscares sowie Level hinzu.
        </p>

        <div class="status-box">
            <div style="font-size: 0.8rem; color: #ff3333; font-weight: bold;">FORTFORTSCHRITT: 20%</div>
            <div class="loading-bar">
                <div class="loading-fill"></div>
            </div>
            <div style="font-size: 0.7rem; margin-top: 10px; color: #555;">
                > Deleting old bugs...<br>
                > Injecting new chaos...<br>
                > Stabilizing core... FAILED.
            </div>
        </div>

        <div class="date">REBOOT: ENDE MÄRZ 2026</div>
    </div>

    <script>
        // Kleiner Effekt: Der Bildschirm wackelt ganz leicht alle paar Sekunden
        setInterval(() => {
            document.body.style.transform = `translate(${Math.random() * 2}px, ${Math.random() * 2}px)`;
        }, 100);
    </script>
</body>
</html>
