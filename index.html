<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Glück... du wirst es brauchen! 😂</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: all 0.2s ease;
            user-select: none;
        }

        /* Bann-Screen */
        #banScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ff0000, #660000);
            color: white;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            text-align: center;
        }

        #runAwayBtn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            z-index: 100;
            box-shadow: 0 5px #c0392b;
            transition: left 0.1s ease, top 0.1s ease;
        }

        .glitch { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(0deg); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="banScreen">
        <h1>🚨 ZUGRIFF VERWEIGERT 🚨</h1>
        <p id="banMsg">Cheater erkannt! Du bist gesperrt.</p>
        <h2 id="timer">04:00</h2>
        <p>Neu laden bringt dir gar nichts... 😉</p>
    </div>

    <div id="mainContent" class="container">
        <h1 id="header">Versuch's doch! 🎈</h1>
        <div id="counterDisplay">Erfolge: <span id="count">0</span></div>
    </div>

    <button id="runAwayBtn">KLICK MICH!</button>

    <script>
        const btn = document.getElementById('runAwayBtn');
        const banScreen = document.getElementById('banScreen');
        const timerDisplay = document.getElementById('timer');
        let lastClick = 0;
        let initialETag = null;

        // --- 1. AUTO-UPDATE LOGIK (Prüft alle 30s auf neue GitHub-Version) ---
        async function checkForUpdates() {
            try {
                const response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' });
                const etag = response.headers.get('etag') || response.headers.get('last-modified');
                if (!initialETag) {
                    initialETag = etag;
                } else if (etag !== initialETag) {
                    location.reload();
                }
            } catch (e) { /* Ignore */ }
        }
        setInterval(checkForUpdates, 30000);

        // --- 2. BANN SYSTEM ---
        function checkBan() {
            const banEnd = localStorage.getItem('banEndTime');
            if (banEnd && Date.now() < banEnd) {
                activateBan(banEnd);
            }
        }

        function activateBan(endTime) {
            banScreen.style.display = 'flex';
            const interval = setInterval(() => {
                const remaining = Math.round((endTime - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(interval);
                    localStorage.removeItem('banEndTime');
                    location.reload();
                } else {
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        function triggerBan(reason) {
            const endTime = Date.now() + (4 * 60 * 1000); 
            localStorage.setItem('banEndTime', endTime);
            document.getElementById('banMsg').innerText = reason;
            activateBan(endTime);
        }

        // --- 3. ANTI CHEAT (Dev-Tools & Autoclicker) ---
        document.addEventListener('keydown', (e) => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                triggerBan("Versuchst du etwa die Konsole zu öffnen? SCHÄM DICH! 😤");
            }
        });

        btn.addEventListener('click', () => {
            const now = Date.now();
            if (now - lastClick < 60) {
                triggerBan("Autoclicker erkannt! 🤖 So schnell klickt kein Mensch.");
                return;
            }
            lastClick = now;
            alert("WAS?! Wie hast du das geschafft? 😱");
            moveButton();
        });

        // --- 4. LUSTIGES CHAOS (Cursor, Flip & Glitch) ---
        const cursors = ['wait', 'help', 'crosshair', 'move', 'not-allowed', 'progress', 'no-drop'];
        
        setInterval(() => {
            // Cursor-Chaos
            document.body.style.cursor = cursors[Math.floor(Math.random() * cursors.length)];
            
            // Random Flip (Bildschirm drehen)
            if(Math.random() > 0.9) {
                document.body.style.transform = "rotate(180deg)";
                setTimeout(() => { document.body.style.transform = "rotate(0deg)"; }, 2000);
            }

            // Glitch-Effekt
            if(Math.random() > 0.8) {
                document.body.classList.add('glitch');
                setTimeout(() => document.body.classList.remove('glitch'), 500);
            }
        }, 4000);

        function moveButton() {
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 60%, 80%)`;
        }

        btn.addEventListener('mouseover', moveButton);
        window.onblur = () => { document.title = "KOMM ZURÜCK! 😭"; };
        window.onfocus = () => { document.title = "Viel Glück beim Klicken! 😂"; };

        checkBan();
        moveButton();
    </script>
</body>
</html>
