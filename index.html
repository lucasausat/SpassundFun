<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viel Glück beim Klicken! 😂</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            transition: background-color 0.2s ease;
        }

        h1 {
            color: #ff4757;
            text-shadow: 2px 2px #ffcc00;
            user-select: none;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 5px dashed #2ed573;
            z-index: 1;
            user-select: none;
        }

        #runAwayBtn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px #c0392b;
            z-index: 100;
            touch-action: none;
        }

        #counterDisplay {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Willkommen bei Spaß & Fun! 🎈</h1>
        <p>Ein ganz normaler Button. Nichts Besonderes...</p>
        <div id="counterDisplay">Geduld-Level: <span id="count">0</span></div>
    </div>

    <button id="runAwayBtn">Klick mich!</button>

    <script>
        const btn = document.getElementById('runAwayBtn');
        const countSpan = document.getElementById('count');
        let clicks = 0;
        let scale = 1;

        const fakeMessages = [
            "Knapp daneben ist auch vorbei! 😜",
            "Maus-Batterie leer? Versuch's nochmal! 🔋",
            "Systemfehler: Nutzer zu langsam. 🐢",
            "Soll ich kurz anhalten? NÖ! 🏃‍♂️",
            "Oha, fast! Aber eben nur fast. 🙃"
        ];

        function moveButton() {
            // Button wird bei jedem Versuch kleiner
            if (scale > 0.4) scale -= 0.05;
            
            const maxX = window.innerWidth - btn.clientWidth;
            const maxY = window.innerHeight - btn.clientHeight;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            // Hintergrund-Farbe ändern
            const hue = Math.floor(Math.random() * 360);
            document.body.style.backgroundColor = `hsl(${hue}, 70%, 80%)`;

            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.transform = `scale(${scale}) rotate(${Math.random() * 20 - 10}deg)`;
        }

        // Weglaufen bei Maus oder Touch
        btn.addEventListener('mouseover', moveButton);
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        // Falls es doch jemand schafft
        btn.addEventListener('click', () => {
            clicks++;
            countSpan.innerText = clicks;
            
            const randomMsg = fakeMessages[Math.floor(Math.random() * fakeMessages.length)];
            alert(randomMsg);
            
            // Nach einem Klick wird er wieder groß, aber flüchtet sofort
            scale = 1;
            moveButton();
        });

        // Startposition
        btn.style.left = '50%';
        btn.style.top = '70%';
    </script>
</body>
</html>
