<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FUNNY CHAOS GAMES 💀</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

/* epilepsie warnung */

#warning{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
color:#ff4444;
text-align:center;
padding:10px;
font-size:14px;
z-index:10000;
}

/* jumpscare */

#jumpscare{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
font-size:20rem;
z-index:9999;
}

/* spiel info */

#gameTitle{
font-size:2rem;
margin-bottom:20px;
}

/* button */

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
background:#ff3333;
color:white;
}

</style>
</head>

<body>

<div id="warning">
⚠ WARNUNG: Diese Seite enthält schnelle visuelle Effekte, blinkende Farben und Jumpscares.
Nicht geeignet für Menschen mit Epilepsie oder Lichtempfindlichkeit.
</div>

<div id="jumpscare">💀</div>

<h1 id="gameTitle">Spiel wird geladen...</h1>

<div id="gameArea"></div>

<script>

/* jumpscare */

function scare(){

const j = document.getElementById("jumpscare")

j.style.display="flex"

setTimeout(()=>{
j.style.display="none"
},200)

}

/* game area */

const gameArea = document.getElementById("gameArea")
const title = document.getElementById("gameTitle")

/* game list */

const games=[gameButtonRun,gameFakeButtons,gameDisappear,gameChaos]

/* wechsel */

function loadRandomGame(){

gameArea.innerHTML=""

const g = games[Math.floor(Math.random()*games.length)]

g()

}

/* GAME 1 */

function gameButtonRun(){

title.innerText="Spiel: Fang den Button"

let btn=document.createElement("button")
btn.innerText="KLICK"

gameArea.appendChild(btn)

move()

btn.onmouseover=move

btn.onclick=()=>{
scare()
}

function move(){

btn.style.position="absolute"

btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"

}

}

/* GAME 2 */

function gameFakeButtons(){

title.innerText="Spiel: Finde den echten Button"

for(let i=0;i<6;i++){

let btn=document.createElement("button")

btn.innerText="KLICK"

btn.style.position="absolute"

btn.style.left=Math.random()*window.innerWidth+"px"
btn.style.top=Math.random()*window.innerHeight+"px"

btn.onclick=()=>{

if(i===2){
alert("Richtig!")
}else{
scare()
}

}

gameArea.appendChild(btn)

}

}

/* GAME 3 */

function gameDisappear(){

title.innerText="Spiel: Der verschwindende Button"

let btn=document.createElement("button")
btn.innerText="KLICK"

gameArea.appendChild(btn)

btn.onclick=()=>{

btn.style.display="none"

setTimeout(()=>{
btn.style.display="block"
},1000)

}

}

/* GAME 4 */

function gameChaos(){

title.innerText="CHAOS SPIEL"

let btn=document.createElement("button")

btn.innerText="KLICK"

gameArea.appendChild(btn)

btn.onclick=()=>{

document.body.style.transform="rotate("+Math.random()*360+"deg)"

scare()

}

}

/* game wechsel alle 30s */

setInterval(loadRandomGame,30000)

loadRandomGame()

/* devtools erkennung */

setInterval(()=>{

const threshold=160

if(window.outerWidth-window.innerWidth>threshold ||
window.outerHeight-window.innerHeight>threshold){

alert("Manipulation erkannt")

}

},1000)

/* tastenkombi */

window.addEventListener("keydown",e=>{

if(e.key==="F12" ||
(e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key))){

alert("DevTools erkannt")

}

})

</script>

</body>
</html>
