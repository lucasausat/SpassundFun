<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROLL-ENDLEVEL 💀</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.1s;
            user-select: none;
        }

        #banScreen, #jumpscare {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        #banScreen { 
            background: black; 
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace;
        }

        #jumpscare { background: black; color: white; font-size: 15rem; }

        #runAwayBtn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            z-index: 100;
            box-shadow: 0 5px #c0392b;
            transition: transform 0.1s ease;
        }

        .flash { animation: flashAnim 0.1s infinite; }
        @keyframes flashAnim {
            0% { background-color: #ff0000; }
            50% { background-color: #00ff00; }
            100% { background-color: #0000ff; }
        }

        .crazy-rotate { animation: rotateAnim 1s infinite linear; }
        @keyframes rotateAnim {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .ban-glitch { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(5px, 5px); }
            50% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="jumpscare">💀</div>

    <div id="banScreen" class="ban-glitch">
        <h1>⚠ KRITISCHER SYSTEMFEHLER ⚠</h1>
        <p style="font-size: 1.5rem;">ZUGRIFF VERWEIGERT: UNBEFUGTER MANIPULATIONSVERSUCH</p>
        <div style="border: 2px solid red; padding: 20px; background: #200000;">
            <h2 id="timer">04:00</h2>
            <p>Dein Browser wurde für diese Seite temporär isoliert.</p>
        </div>
        <p style="margin-top: 20px; font-size: 0.8rem;">Error Code: CHEATER_DETECTED_0x666</p>
    </div>

    <div id="mainContent">
        <h1 id="header">Fang den Button! 🎈</h1>
        <div id="counterDisplay" style="font-size: 2rem;">Score: <span id="count">0</span></div>
    </div>

    <button id="runAwayBtn">KLICK MICH!</button>

    <script>
        const btn = document.getElementById('runAwayBtn');
        const countSpan = document.getElementById('count');
        const jumpscare = document.getElementById('jumpscare');
        const banScreen = document.getElementById('banScreen');
        
        let clicks = 0;
        let lastClick = 0;
        let initialETag = null;

        // --- 1. AUTO-RELOAD BEI GITHUB UPDATE ---
        async function checkUpdate() {
            try {
                const res = await fetch(window.location.href, { method: 'HEAD', cache: 'no-cache' });
                const etag = res.headers.get('etag');
                if (initialETag && etag !== initialETag) location.reload();
                initialETag = etag;
            } catch(e) {}
        }
        setInterval(checkUpdate, 10000);

        // --- 2. DAS HARTE BANN-SYSTEM ---
        function activateBan(reason) {
            const duration = 4 * 60 * 1000; // 4 Min
            localStorage.setItem('banEndTime', Date.now() + duration);
            location.reload(); 
        }

        function checkBanStatus() {
            const endTime = localStorage.getItem('banEndTime');
            if (endTime && Date.now() < endTime) {
                banScreen.style.display = 'flex';
                document.title = "!!! GESPERRT !!!";
                
                // Blockiert die Konsole aktiv durch Debugger-Loop
                setInterval(() => { debugger; }, 50);

                const timerInt = setInterval(() => {
                    const remaining = Math.round((endTime - Date.now()) / 1000);
                    if (remaining <= 0) {
                        localStorage.removeItem('banEndTime');
                        clearInterval(timerInt);
                        location.reload();
                    } else {
                        const m = Math.floor(remaining / 60);
                        const s = remaining % 60;
                        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    }
                }, 1000);
                return true;
            }
            return false;
        }

        // --- 3. ANTI-CHEAT (Streng) ---
        // Konsole erkennen
        window.addEventListener('keydown', e => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'C' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                activateBan("DevTools");
            }
        });

        // Autoclicker-Check
        btn.addEventListener('click', () => {
            const now = Date.now();
            if (now - lastClick < 60) {
                activateBan("Autoclicker");
                return;
            }
            lastClick = now;
            clicks++;
            countSpan.innerText = clicks;
            alert("Wie hast du das gemacht?! 😱");
            moveButton();
        });

        // --- 4. GAME-LOGIK & CHAOS ---
        function moveButton() {
            if (localStorage.getItem('banEndTime')) return;
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            document.body.style.backgroundColor = `hsl(${Math.random() * 360}, 60%, 85%)`;
        }

        // Jumpscare alle 15-40 Sek
        function randomJumpscare() {
            if (Math.random() > 0.8) {
                jumpscare.style.display = 'flex';
                setTimeout(() => { jumpscare.style.display = 'none'; }, 150);
            }
            setTimeout(randomJumpscare, Math.random() * 25000 + 15000);
        }

        // Einmal pro Minute: Alles dreht sich
        setInterval(() => {
            document.body.classList.add('flash');
            btn.classList.add('crazy-rotate');
            setTimeout(() => {
                document.body.classList.remove('flash');
                btn.classList.remove('crazy-rotate');
            }, 6000);
        }, 60000);

        btn.addEventListener('mouseover', moveButton);

        // Start
        if (!checkBanStatus()) {
            moveButton();
            randomJumpscare();
        }
    </script>
</body>
</html>
